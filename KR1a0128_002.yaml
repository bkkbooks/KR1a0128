body:
  text: 春秋占筮書卷二翰林院檢討毛竒齡撰初晉獻公筮嫁伯姬于秦遇歸妹兊下震上之暌兊下離上史蘇占之曰不吉此又追記晉嫁姬筮辭以并驗其事史蘇晉筮官其繇曰士刲羊亦無􅎺也女承筐亦無貺也繇即易詞士刲羊二句本歸妹上六爻詞先述之以明不吉之故蓋歸妹名卦原以上震長男與下兊少女難為匹配故以震兄兊妹作長兄嫁妹之象此本不利嫁娶者况歸妹上爻正言新娶謁廟禮所稱男以特羊告廟女以棗栗脯修承筐進獻者而乃上非正位下又無應娣姒匹配薦享不行則雖震為筐震仰盂為筐又服虔謂震為竹竹為筐兊為羊離為刃坎為血皆説卦諸象皆見而上位過髙不惟超兊亦越離坎雖欲行謁禮而無其具也西鄰責言不可償也歸妹之暌猶無相也兊西方之卦秦在西恰是西鄰服虔以為三五互坎坎為月月出在西為西鄰則間一層矣責言不償正指伐晉責報言兊為口舌動多責讓而互坎之耳半掩于震互坎半體為震所掩誰能償之相助也婚姻以求助傳所謂繫援之者而歸妹之暌則一嫁而暌隔之矣且上曰暌孤孤亦何助震之離亦離之震為雷為火為嬴敗姬且其象有大異者夫以歸妹之震變而生離謂震之離則當未變時震之下剛生于互離亦離之震也震以木而生雷火則木為火母震母家也乃震變為離而離反以火而轉焚其木此俗所云生女外向不利母家者非嬴敗姬乎車脫其輹火焚其旗不利行師敗于宗丘丘讀欺國風送子涉淇至于頓丘然且震為車車上變而下輹脫矣震木上動則為旗乃變為火剛而旗上焚矣雖離為戈兵為甲胄有行師之象而轍亂旗靡亦有何利夫震我也之離客也我之主震倒艮山而為之丘是主丘即宗邑也而乃變客之離剛而敗于其地是敗于宗丘矣此指韓原之敗言舊注韓有先君廟張文檒曰震木上動為旗本杜氏注舊謂荀九家易兊為常吳澄謂常為九旗之一此歸妹原有兊則火焚在上當是兊旗不知上震之災不及下兊且暌亦有兊焚無兩旗則其象亂矣故不取焉歸妹暌孤寇張之弧此指獲晉侯并歸晉侯言夫歸妹之所之者暌孤也之彼為敵則暌孤者寇也然而其辭曰先張之弧後脫之弧夫猶是弧也而冦張之冦忽脫之則猶是晉侯而冦獲之冦忽歸之其象正同姪其從姑六年其逋句逃歸其國而棄其家讀孤明年其死于髙梁之虛墟同此下皆指子圉事言子圉以十六年質秦秦妻之二十二年子圉逃歸二十三年惠公卒子圉立是為懷公二十四年秦穆納公子重耳懷公奔髙梁重耳弒之此其事也今筮者謂歸妹以震兄嫁兌妹則火本為震所出故以嫁女言之則離火者震木之女也而以歸妹言之則離火者又震兄之子也母女為姑而兄子即為姪則同此一離而姑姪並居有似乎從之者然顧以環占言之不曰震之離亦離之震乎卦盛極必反自震一之離而兩卦上下合成四離兩正兩互火炎極矣極則離必之震故自上之初閲六爻而上又變則六年矣六年而離上之剛仍變震柔變者逋也逋則震為宗國今復逃歸而所妻之家所云男以女為家者亦棄如敝屣豈非離亦之震乎然而六爻相巡一周而盡隂生陽死不俟多日况上剛既亡將向之一梁髙出巋然橫亘者亦變而為墟歸于是死亦于是矣此櫽括晉惠子圉兩事而預斷之者髙梁晉邑後子圉被弒果在其地或謂此筮在昔人相傳巳久服其神驗故圉死之地即名髙梁此死後稱之非先有其地者然此皆少見多怪以小人之腹妄度君子欲為回護而反見其陋成季未生時卜者謂當名為友及生而果有文在其手曰友因名之此在百餘年後趙簡子史墨猶能道及不知此腹中友字在生後刺之抑先有其文者試亦度之張文楚曰環占法前畢萬筮仕傳既占屯震之坤為諸侯又轉占比坤之震亦為諸侯謂之終復其始法同及惠公在秦曰先君若從史蘇之占吾不及此此時無子圉事故僅記此語以完秦伯伐晉傳僖二十五年傳秦伯師于河上將納王狐偃言于晉侯曰求諸侯莫如勤王使卜偃卜之曰吉卜文不載時襄王以王子帶之亂出居于鄭秦穆將納王狐偃勸晉文先之以攘其功勤王即納王以勞于王事曰勤卜偃卜筮官筮之遇大有離上乾下之暌離上兊下曰吉遇公用享于天子之卦也戰克而王饗吉孰大焉公用享于天子即大有九三爻詞在本辭之義原謂乾三踞下國之首象屬三公三公近天子往得受天子饗禮而兊口離腹加之夏離秋兊值時物長養之候可行燕饗説卦兊為羊鄭氏本作養故即用其辭以為戰克而王饗吉孰大焉其云戰克者以勤王必戰也舊注謂卜辭有黃帝戰于阪泉之兆語故云則卜筮兩辭安得雜見誤矣張文彬曰兩卦皆有離離為甲曽戈兵正戰象也况變兊而得互離則兵甲愈盛戰巳勝矣且是卦也天為澤以當日天子降心以逆公不亦可乎夫有去暌而復亦其所也且以乾天變兊澤是天為澤也天最髙而澤最下是降心也天為澤以承日則與王之降心以迎公何異此觀其所之而有斷然者乃即以環占推之縱去暌而占大有下乾上離以乾天而下離日降心亦然所謂無往而不得其所者雖還復其卦亦如是也是時謀迎王反曰逆公者以勤王言則迎王以王饗言則逆公乃其象則正義謂乾變澤以延日影如迎日然此為得之晉侯辭秦師而下次于陽樊右師圍溫左師逆王王入于王城取大叔即王子帶于溫殺之晉侯朝王王饗醴命之宥此勤王戰克王饗之驗饗醴既饗而又設醴酒宥助也又以幣帛為助附宣十二年傳晉師救鄭及河聞鄭既及楚平桓子欲還即荀林父將中軍者彘子不可即先穀佐中軍者知莊子荀首曰此師殆哉此記晉楚戰于泌而晉師敗績之事然口語及之並非筮詞與蔡墨説龍子太叔論楚子並同惟此傳與占筮相表裏故附載之周易有之在師坎下坤上之臨兊下坤上曰師出以律否臧凶此師卦初爻辭執事順成為臧逆為否此引易而亦占變者先引遇卦爻辭論之釋言云坎律銓也樊光曰坎水也水性平故律與銓皆取水為平準又郭璞曰易坎卦主法法律皆所以銓量輕重是坎為律象又且黃鐘為律本而位乎坎故坎為律為法今以坤衆之師出之以內坎之律是中軍有令而師衆從之所以臧也否則不臧而凶矣所以執兵事者坤為順順成為臧逆則凶衆散為弱川壅為澤有律以如已也故曰律否臧且律竭也盈而以竭夭且不整所以凶也此兼論之卦坤衆説卦水亦衆見白虎通并杜注既失坎律則坎衆亦散將變而為兊之少女弱矣又且坎本川流改為兊澤川亦壅矣夫有律以從已也如者從也見杜注今不從而逆則律敗竭者敗也川盈而竭律甚嚴正而夭邪不整以至敗壞非凶而何不行之謂臨有帥而不從臨孰甚焉此之謂矣果遇必敗彘子尸之雖免而歸必有大咎且師貴行也惟臨則坤土所行遇澤即止謂之不行今彘子逆命師不行矣若遇楚師恐將不免師在三五不能無輿尸之象其人佐中軍即弟子也弟子輿尸彘子能免之乎縱或免歸必有大咎此為明年殺先縠傳成十六年博晉侯將伐鄭楚子救鄭公晉侯筮之史曰吉其卦遇復坤上震下此晉楚戰鄢陵而晉筮之者復是專卦曰南國蹙射其元王中厥目蹙目韻其卦本六陰而一陽來復故謂之復則當未復時固重坤卦也坤為國兩國寬然及陽復而在南一國實有一剛挫其地而不成為坤則南國蹙矣南國者楚也且夫復之加一陽而為震也震為長為諸侯即元王也顧卦位坎離爻純即見今坤本純隂而坎之弓輪離之戈甲皆説卦兩師俱見獨南離為目説卦橫集一矢有似于坎弓之射之而中之者則夫震剛之受射者非其王而離眶之半掩者非其目乎張文檒曰明何楷説易稍識筮法其説此卦謂貞我悔彼初九元吉在莪上六災眚大敗以其國君皆屬彼且以震木克坤土射之義也以災眚而致大敗眚為目疾則中厥目之象也此較之宋儒之妄誕庶幾近理然中目無象且以貞悔分彼我亦筮法一節顧與此卦大不合説見仲氏易及戰射共王中目襄九年傳穆薑薨于東宮始往而筮之遇艮之八艮上艮下穆薑成公母以通于叔孫僑如欲廢成公而立公子偃公子鉏且使僑如訴于晉而逐季孟事敗故徙居東宫此因其既死而追述始往之筮以為戒雖薑氏自為筮辭然悔罪親切辭與事有恰合者東宫太子宫也艮之八者揲筮之策以六七八九為陰陽老少之數從來莫解説見仲氏易乾卦及易小帖張文檒曰艮不能變隨必艮之五爻俱變獨第二不變則為隨則此第二爻者即之隨之爻也乃商易揲策以八為少陰不變故指此不變之爻為八是艮之八實艮之第二爻耳史曰是謂艮之隨兊上震下隨其出也君必速出此史就隨卦名略説以慰薑氏之心以為隨者上兊下震口乍啓而足隨之且動而得恱兊口震足震動兊説皆説卦有出之之象君小君也薑曰亡是於周易曰隨元亨利貞無咎此隨卦辭而薑曰否此在周易卦詞曰隨元亨利貞無咎然果無咎哉元體之長也亨嘉之會也利義之和也貞事之幹也體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨無咎元體之長至足以幹事古釋卦辭凡卦有元亨利貞者皆以此釋之故孔子取以為文言而薑亦用以釋隨不然薑氏先孔子生時十有餘年而反得用孔子語謬矣然故不可誣也以下是薑自解筮之詞以為此四德者固元亨利貞之謂也然慮其誣也男女相隨動而得説稍有假借便是失德是必不誣于其德而後內剛外柔雖隨無咎今我婦人而與于亂固在下位而有不仁不可謂元今我不然東宫本下位而降而居之然且震為太子宫長男出震為太子宫而位居東方即東宫也震東方之卦乃以艮變隨而震宫在下則其在下位有固然者然而坤元也坤元之位豈不尊上而我以婦人而與於淫失淫失為亂一似人之無良我以為君者元君猶在無良仁良奈何不靖國家不可謂亨作而害身不可謂利然且坤元本安靖而在艮之坤二陽擾之在隨之坤三陽擾之凡筮遇為我而之為彼在我家也在彼國也坤妻道為家為國見前今在國則一君擾內指成公二臣擾外指季孟在家則又二少男指二公子合擾中外國家之不靖甚矣不亨矣乃由國而家而身其在遇艮則曰艮其背不獲其身而在艮二變隨則又曰艮其趾不拯其隨是身不得作雖欲隨所之而不可得矣而况作而之震震又隨兊一舉足而蹈澤中震足兊澤不惟不得作即作而身亦何利棄位而姣不可謂貞且夫匹配各有位也坤位西南本與艮位之東此相配對也今重艮一變而坤棄位而左降為兊艮亦棄位而左降為震隨之兊震適俱位坤艮之左長男幼女顛倒配合是姣也姣者淫也坤貴安貞而棄位而淫可謂貞乎有四德者隨而無咎我皆無之豈隨也哉我則取惡能無咎乎必死于此弗得出矣是四德不備不可為隨去德取惡焉能無咎此在艮卦辭有云行其庭不見其人我之死此中必也若欲出此則一入震宫而艮門兩剛有若重鍵二四互艮上有二陽然且山填之艮澤蔽之兊少男少女環守之三艮一兊雖艮有多門而總巳毁拆重艮所變有五文兌為毁拆往艮彖有云艮者止也止其所也止此而巳雖欲出弗可得矣按薑此筮辭實多才有學雖悔罪不吝而尚隱乎為辭者故詞似淺近而卦象微眇推測不盡策書載此以示婦人無德有才何用中冓自訟祇增愧嘆此與弼風之録氓詩並同附宋時金舉兵來侵筮之遇蠱之隨此正相反之卦六爻俱動然仍占遇之兩卦彖朱氏謂六爻皆動則占遇卦大謀占者曰我有震威震為出威見國語而外當毁拆兊為毁拆敵敗之象也內我外敝蓋隨自否來又自益來皆以上剛填下柔皆三陽推易法而蠱之所變亦復如是艮上變柔蠱艮上九變隨兊上六巽初變剛蠱巽初六變隨震初九乾元往上下填坤初斷敵兵之首而墜于地矣且兩互為漸三五互巽二四互艮合之為風山漸漸之辭曰夫征不復其何能返此倣漢魏諸家斷法而為説者其後果驗襄二十五年傳齊棠公之妻東郭偃之姊也棠公死偃御崔武子以弔焉見棠薑而美之使偃娶之筮之遇困坎下兊上之大過巽下兊上陳文子曰夫從風風隕句妻不可娶也坎為中男故曰夫變而為風故從風然而風能隕物則此妻何可娶也且其繇曰困于石據于蒺藜入于其宫不見其妻凶此困六三爻詞困于石往不濟也據于蒺藜所恃傷也入于其宫不見其妻凶無所歸也此文子占筮之辭按推易法困從否來虞翻謂否三在互艮之二陰而前當艮剛正石也水逢石而險則不濟矣荀九家易坎為叢棘為蒺藜所恃如此不又多傷乎且三居互離之中而前後掩空此非中空若房世俗之所稱離宫者哉夫坎男之隂亦即離女之隂也三為坎之上隂即互離之中隂既為坎男而已入離宫即欲再求所為離女者而何可復得男以女為家無家將安歸所以凶也崔子曰嫠也何害先夫當之矣言棠公已當此凶遂取之莊公通焉崔子弒之二十七年崔成崔疆殺東郭偃崔子御而出見慶封避慶封家慶封曰請為子討之使盧蒲嫳帥甲以攻崔氏止崔子于家駕言討賊而反使攻崔氏遂滅崔氏其妻縊即棠薑嫳復命于崔子且御而歸之嫳御崔子歸至則無歸矣附晉史元帝為晉王時將渡江使郭璞筮之遇豫之暌璞曰會稽當出鐘以告成功上有勒銘應在人家井泥中得之繇辭所謂先王以作樂崇德殷薦之上帝是也豫象辭及帝即位太興初會稽剡縣果于井中得一鐘長七寸二分口徑四寸半上有古文竒書十八字人罕識者先仲氏以推易法衍之豫上震下坤震為龍為首出之子而下連坤土此奮而出地之象也悔為暌上離下兊嚮明而治而金以宣之體離互亦離暌二四互離此重明重光中興之象也震為鳴為聲説卦故先王以作樂崇德而合暌之兊金以升于暌之離火是坐明堂向南離而考擊鐘鏞以作樂之象也祇兩卦皆有坎水以陷之豫暌三五皆互坎則尚在陷中未經出土而豫坎互坤豫三爻為坎坤互用則當在水土之間况豫之震為東方離為南方會稽者東南郡也豫有互艮豫二四互艮艮為成萬物之所以成終者也説卦則非告成功乎若曰鐘有勒銘有古文則暌離為文兊為言以文為言非勒銘乎至若長七寸二分者南北為縱縱即長也南離之數天七地二此大衍之數宋儒誤以為河圖下同則七寸二分也大數陽小數陰也徑四寸半者東西為衡衡即徑也西兊之數地四天九則四寸半也隂數四折陽數之九而半分之則四寸有五也春秋占筮書卷二
