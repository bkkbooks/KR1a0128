body:
  text: 春秋占筮書卷三翰林院檢討毛竒齡撰昭五年傳初穆子之生也莊叔以周易筮之穆子叔孫穆子名豹者也莊叔穆子父也按成十六年穆子避僑如之難奔齊及庚宗遇婦人宿焉襄二年召歸立為卿庚宗婦攜其子獻雉問所生曰能奉雉矣召見號曰牛使為豎有寵長使為政乃以讒殺長子孟又譖而逐仲穆子疾并私絶其饋餓死至是昭子即位殺牛因追述穆子初生之筮以驗之遇明夷離下坤上之謙艮下坤上以示卜楚丘卜人名曰是將行而歸為子祀以讒人入其名曰牛卒以餒死祀牛死韻牛音昵先立有韻筮詞以檃括大意復逐節解之明夷日也日之數十故有十時亦當十位自王巳下其二為公其三為卿日上其中食日為二旦日為三明夷之謙明而未融其當旦乎故曰為子祀明者日也夷者傷也離在地下則明為地掩未免受傷然而日之數十自甲至癸其時數皆十而與人位之十等相當如日中當王以陽盛也食時當公以次而左旋至日昃平旦當卿雞鳴當士夜半當皂人定當輿黃昏當𨽻日入當僚晡時當僕日昳當臺大抵自王一等以下其二等為公三等為卿則是日中為上等食時為二等旦明為三等今以莊叔本卿位而當明夷之初旦且變而之謙謙又卑退則雖已旦明而尚未融暢恰是卿位故曰為子祀言可繼子奉祀者日之謙當鳥故曰明夷于飛明而未融故曰垂其翼象日之動故曰君子于行當三在旦故曰三日不食日之謙當鳥謂日之謙之爻即初爻也離為飛鳥見九家易又説卦為雉虞氏易為隼為鶴而未明初飛即變為艮是離之兩剛相夾如健翮者而初剛下折是垂其一翼也且日動震亦動也離日巳動而三五互震且復前行是于行也乃甫行而日位當三又非食時則三日不食矣張文彬曰按推易法明夷為臨卦所易廢下兊之口以成離虛離中虛此一不食也若明夷之謙破下離之腹以就艮之鬼冥門見前則直餓死矣又不食也故仲氏易曰穆子兩不食前之不食在庚宗時使婦私為食而就宿焉因生豎牛此推易法也後之不食則絶其饋食雖山有果蓏亦反虛器而出之而因而餒死此古之卦法也其精如此離火也艮山也離為火火焚山山敗於人為言敗言為讒故曰有攸往主人有言言必讒也純離為牛世亂讒勝勝將適離故曰其名曰牛此又以環占法推之以離火變艮山而還而觀之則亦可以離火焚艮山而艮敗矣艮為人字形為成言説卦成言乎艮艮敗則人言俱敗將有以主人而聽讒言者夫純離為牛謂離上離下其卦詞曰畜牝牛吉今以離之艮而艮還之離則純離矣純離當名牛則世亂讒勝似必有名牛者起而敗之非無故也此指豎牛之亂言張文彬曰仲氏易謂庚宗之婦固下離之中女也離者别也乃初變為艮而少男生焉然且此艮一變而謙之三五互震為長男二四互坎為中男者其二剛爻總以一艮剛掩之殺長孟而誅仲子皆推之而瞭然者謙不足飛不翔垂不峻翼不廣故曰其為子後乎吾子亞卿也抑少不終若論其位則自在卿等既不利攸往則歸而為後所固然者但吾子亞卿而是子繼之似于旦日亞卿之位少未盡耳昭七年傳衛襄公夫人薑氏無子嬖人婤姶生孟縶初生也孔成子夢康叔謂己立元史朝亦夢康叔謂已夢協婤姶生子然後生子名之曰元孟縶之足不良能行不能善行跛也孔成子筮之曰元尚享衛國問詞遇屯震下坎上又曰余尚立縶亦問詞遇屯之比坤下坎上史朝曰元亨又何疑焉元亨屯卦詞成子曰非長之謂乎以年不以名對曰康叔名之可謂長矣此長者之命并不以名孟非人也將不列于宗不可謂長况跛非全人不在宗長幼之列且其繇曰利建侯嗣吉何建建非嗣也二卦皆云子其建之此以卦詞與名合故祗斷卦詞亦一法也利建侯屯卦詞與屯初爻之辭皆同是兩詞兩卦俱建侯矣夫嗣有常位若拘長少則嗣之而巳何庸建也建必擇吉子其建之弱足者居侯主社稷臨祭祀奉民人事鬼神從會朝又焉得居各以所利不亦可乎且屯之爻辭不又曰利居貞利建侯乎夫利有兩等有利居者有利侯者弱足者利居以不能行也若侯則宗廟社稷人民朝會行動之不暇而居之乎然則易辭之兩利明有分屬一居之而一建之何不可之有故孔成子立靈公昭十二年傳南蒯之將叛也枚筮之遇坤坤上坤下之比坎上坤下曰吉南蒯南遺之子季氏費邑宰也蒯興公子憖叔仲小謀叛費以逐季氏不告以斷筮之事而但下一空籌以筮之謂之枚筮示子服惠伯曰即欲有事何如惠伯曰吾嘗學此矣忠信之事則可不然必敗此亦不告惠伯事而泛咨之謂若欲有所行之事何如即字古文多作若字解惠伯逆知其事故陰以折之曰亦顧其事何如耳不然則迪吉逆凶無容問者外強內溫忠也和以率貞信也故曰黃裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極外內倡和為忠率事以信為共供養三德為善非此三者弗當此皆就易義以隂斷其事即筮詞也外強二語是合斷兩卦者坎險為外強坤順為內溫以遇與之即內外也忠信者即前所云忠信之事也故曰以下則專斷坤卦謂黃裳元吉豈黃裳而即吉乎黃為中色裳為下飾必元善而後能吉向使為中者無忠心則必失臣道安有臣象黃色臣象下不共則上不率下安所整飾其後費邑亦叛蒯况事無忠信則元善已失安能終事極者終也是必同事有忠者公子憖叔仲小皆不忠下有信者其後蒯之臣司徒老祁慮癸以盟信逐蒯且合忠信與共為三德以統成元善則可當非是勿當也且夫易不可以占險將何事也且可飾乎中美能黃上美為元下美則裳參成可筮猶有闕也筮雖吉未也此専斷比詞者且坎者險也坎雖隱伏説卦而辭曰顯此比五爻詞則其險巳著况外卦坎位而又變而尚以坎則其為大險有不容隱伏焉者假曰筮易不可以占險則所占何事况占有貞悔並非可以黃裳一飾謂足掩蔽了事也夫黃裳之文在中坤五爻詞與顯比之位正中比五爻辭祇中美也然必推比彖之元永貞與顯比之上使中一彖詞一爻詞皆本元善而後為上美否則徒飾下美而不參成以筮之則邑人不誡亦比辭將有借在上之元與在中之忠以責其多闕失者其後叛蒯者亦終以羣臣不忘其君為言筮雖吉未也附東漢永建三年立大將軍梁商女為貴人筮之亦得坤之比與此筮同當時解之者但曰元吉坤五爻詞正中而巳比五爻詞位正中也其後進為后順帝崩進為皇太后以無子立他妃子臨朝即沖帝也沖帝崩質帝立又臨朝及兄冀弒質帝然後迎桓帝立之而於是有兄冀擅權宦官亂政之禍今占之則坤五后也之比而變剛君也臨朝也所謂顯比者也比九五顯比王用三驅失前禽舍逆取順三驅立三帝也失前禽者無子也猶無前星也舍逆取順者信宦官殺忠良也其最可異者一推自復推易法凡一陽卦俱從剝復來以震初之剛而易比五一推自剝以艮上之剛而易比五震為長子為兄艮為門闕為閽寺俱見説卦合兄冀與宦官而皆與九五有參易之象因之有弒帝亂政之禍向使漢之太史知此則必唾而去之矣乃宋人無學率以先後天方圓兩圖造占變之法而不識周易占筮其神如此不可嘆與哀九年傳宋皇瑗圍鄭師晉趙鞅卜救鄭不吉陽虎以周易筮之遇泰乾下坤上之需乾下坎上曰宋方吉不可與也微子啓帝乙之元子也宋鄭甥舅也祉祿也若帝乙之元子歸妹而有吉祿我安得吉焉乃止此在泰之五六爻辭有曰帝乙歸妹以祉元吉其義以泰之二四為互兊三五為互震震為長男兊為少女原有長兄嫁妹之象因之歸妹六五爻辭與此皆有帝乙歸妹四字而宋為微子封國即帝乙子也明曰祉吉而可以伐乎况此詞曰歸妹而宋鄭又時通婚姻則甥舅國也此亦以詞與事合而就詞斷事如此需九五爻詞曰需于酒食貞吉酒食為祿貞吉為吉祿故以祉字釋祿字亦兼之卦言春秋外傳周語晉孫談之子周適周事單襄公襄公有疾召頃公而告之曰必善晉晉孫談者晉襄公之子惠伯談也周者談之子晉悼公之名頃公者單襄公之子悼公在周襄公服其為人知其必有晉國故囑子與晉善成公之歸也吾聞晉之筮之也遇乾乾上乾下之否乾上坤下曰配而不終君三出焉一既往矣後之不知其次必此此述晉成往日之筮以斷周之宜有國也成公晉公子黑臂舊曽奔周既以趙穿弒靈公迎歸立之筮本迎歸時事而今始斷之者上乾與下乾相配皆君也今三君忽變而為否是否德不終何以克配直出君而已然而出君終君也雖公子亦君也且出而為坤坤為國為衆出有國家何患不君今此三君者其一成公則已往事矣若後第三君則吾不得知以言其次則舍周其誰吾所為可必者此耳及厲公之亂召周子而立之是為悼公晉語晉公子重耳筮返國得貞屯坎上震下悔豫震上坤下司空季子曰吉是在易皆利建侯不有晉國安能建侯屯豫兩卦詞皆有利建侯文坎水也坤土也屯厚也豫樂也車班內外順以訓之泉源以資之土厚而樂其實不有晉國何以當之此合斷兩卦辭也車班內外者震為車班者列也屯列車在內豫列車在外坤順也泉源者坎也屯有互坤與正坎而豫有正坤與互坎土厚而樂其實則是同一國土而屯得其厚豫樂其實實者國之所有也主雷與車而尚水與衆故曰屯其繇曰元亨利貞勿用有攸往利建侯主震雷長也故曰元衆而順嘉也故曰亨內有震雷故曰利貞車上水下必伯小事不濟故曰勿用有攸往一夫之行也乃從兩卦分斷之內卦為主為雷車外卦為尚為水衆者非屯乎乃其詞如此則以震為長男元者長也衆以順而會亨者嘉之會也况震雷在內則每動而上坎水在上則每順而下豈惟利貞伯業于是興矣若夫勿用攸往者則單震為足説卦震為足單男為一夫虞氏易陽為夫一夫之足行安能有濟今車上而衆且如水下矣此伯王之時不可失也衆順而有武威故曰利建侯坤母也震長男也母老子強故曰豫其繇曰利建侯行師居衆出威之謂也是二者得國之卦也更以觀豫則坎本衆順坤亦衆順而皆有震震武威分處內外雖坤為太母震為長子亦既老強而養于坤而出乎震遲暮得國亦復可喜况既曰建侯又曰行師則內坤外震其在居以衆順為樂而一出則威武大行卦雖有二得國則一君何疑焉十月惠公卒十一月秦伯納公子附吕氏春秋孔子筮得賁下離上艮曰不吉子貢曰何謂也曰夫白而白黑而黑賁亦安吉乎家語亦云非正色之謂也山火為十二章飾色之二故名賁賁者飾也但繪山于衣繡火於裳並皆正色而獨此卦義從來以不正色為解如京房云五色不成謂之賁是也特其所云不正者則毛傳云賁黃白色也鄭玄王肅説此卦亦皆云黃白色即揚雄太玄礥首次二曰黃不純屈于根注易賁卦山下有火黃白色也今孔子所云有黑色而無黃色即易文賁如皤如白馬白賁諸語又似祇有白色而并無黑黃二色此皆無可考辨者况筮法論色亦屬創見故附載此漢書武帝伐胸奴筮之得大過九五巽下兊上太卜因謂胸奴不久當破但取象辭何可久也一語爻詞九五枯楊生華老婦得其士夫無咎無譽象曰枯楊生華何可久也老婦士夫亦可醜也乃遣二師伐胸奴後巫蠱事發二師降胸奴武帝咎卦兆反謬今以五易法筮之則此九五在本卦為兊中在大壯所來為震中大壯上震改上兊兊為剛鹵説卦而震以出之此北伐之象但大過通視合為大坎而互當重乾之末進承一坤龍戰玄黃正在此際幸乾坎二位皆居北方坎正北乾西北我以南向北則我南為凱彼北為敗所以能破胸奴兵乘勝追北至范夫人城者此也奈身在坎中尚未出險而兊為口舌又為毁坼非因令誤當以間敗乃詛呪事發而脫身降矣兊者脫也夫枯楊之華不入寒地身為士夫敵醜非偶乃既降單于則身巳為人所得而單于又妻之以女此正匹配反常一若老婦之得士夫者其辭象之切占驗之精孰過于此而以為反謬此占者之罪卦兆焉得誣坐之晉元帝初鎮建鄴王導使郭璞筮之遇咸之井璞曰東北郡縣有武名者當出鐸以著受命之符西南郡縣有陽名者其井當沸後晉陵武進人于田中得銅鐸六枚一作五枚誤見郭璞洞林歷陽縣中井沸經日乃止此事載晉書郭璞傳然世終莫解嘗以此詢仲氏仲氏曰此最淺近者銅鐸之出以貞咸也井之沸以悔井也咸內為艮艮東北之卦也其名武者以上兊在右武位也其出鐸者兊為金與互乾金合而乾數六故得六鐸然且互乾為天互巽為命此天命也故曰此受命之符也若夫井則二四互兊三五互離離兊為西南郡縣而南為陽方故宜有陽名乃以下巽與互兊為金木之交上坎與互離為水火之際木間金得火而上承以水此非薪在釡下得火而水乃沸乎且四正相纒乾麗坤域非中興受命何以得此見仲氏易晉渡江後宣城太守殷祐以郭璞為參軍會有物如牛足卑類象大力而遲行到城下祐將伏取之令璞作卦遇遁之蠱其辭曰艮體連乾其物壯巨是占在晉史無解今録仲氏易解語遁天山皆巨物故此物亦巨山潛之畜蠱上艮為山互兊為潛非兕非虎坤為兕虎以坤間二陽不成故也身與鬼并三陰為鬼蠱三陽三隂合并成卦精見二午離五月卦為建午蠱三至上為大離則倍午矣法當為禽兩翼不許離為雉巽為雞而無兩翼遂被一創遁四陽傷其一為蠱還其本墅自遁之蠱祗傷乾一畫而兩山如故按卦名之是為驢鼠乾為馬艮為鼠今遁乾一變而已失馬形是驢鼠矣卜竟伏者以戟刺之深尺餘遂去不見郡綱紀上祠巫云廟神不恱曰此䢼亭驢山君鼠也偶詣荆山暫來過我何容觸之此事近狡獪然亦見古人筮法有如是者唐李綱在隋仕宦不進筮之得鼎曰君當為卿輔韻然俟易姓為如志叶仕不如退叶折足為敗叶蓋取倒卦之革俟革命也鼎倒卦為革説見前遂稱疾辭位去後仕唐果驗然則筮法有直占倒卦者亦一變也五代石晉髙祖以太原拒命廢帝遣兵圍之勢甚急命馬重績筮之遇同人曰乾健而離明君德向明之象也同人者人所同也此時將必有同我者焉易曰戰乎乾乾西北也又曰相見乎離離南方也其同我者北而南乎乾九十月卦也乾西北卦位在九十月戰而勝其九十月之交乎是歲契丹果助晉擊敗唐軍晉遂有天下聽齋雜記明土木之變南冡宰魏驥將集同官上監國疏會錢塘客陸時至善易請筮之得恆之解驥曰帝出之不恆而承之羞恆九三爻詞不恆其德或承之羞貞吝固也乃變而負乘冦將復至解六三爻詞負且乘致冦至貞吝如之何對曰既已負帝且乘矣再三何害所慮者貞之則吝惟恐徒守反吝耳驥曰善乃易疏去次日客過驥驥曰昨筮無大凶乎曰大吉曰何謂曰夫恆為大坎而三當坎中所以陷也然而恆互為乾三以一乾而嵬然居三乾之間若無往而不為君者乃一變為解則已解矣且解之詞彖詞曰利西南西南者所狩地也又曰其來復則還復也夫恆者久也日月得天而久照此恆彖詞今解之互體則正當兩坎互離之間坎月離日非日月幽而復明乎大明吾國號非返國乎祇坎有兩坎兩離而上離未全上震缺上九此似指監國言尚有待耳後冦果再至以戰得勝而英宗卒返國復辟若先見者春秋占筮書卷三
