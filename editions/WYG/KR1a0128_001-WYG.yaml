body:
  text: 春秋占筮書卷一翰林院檢討毛竒齡撰周易筮書也周官卜人以八頌占卜詞即以八卦占筮詞因之别設筮人掌三易以辨九筮使占人占易皆有成法而惜乎其書不傳惟春秋諸傳間存兩詞其在卜詞如陳敬仲奔齊傳所云鳳皇于飛和鳴鏘鏘是也而在筮辭則如陳敬仲初生傳所云觀國之光光逺而自他有耀是也今燋契不作菙氏之卜辭可無問矣獨是筮闗周易其辭象變占實出羲文孔子三聖所授受故每著筮辭輒屈折幻眇隨其事之端末而言之明明指之鑿鑿凡一十二公二百四十年間所載其詞具在而並無解者雖杜氏有註孔氏有疏義縂未明了即或焦贑京房虞氏荀氏輩偶一論及亦且彼此卜度而不得領要以致王弼邪説横行于世而宋人和之且謂春秋筮辭統屬附㑹一似事後言狀增損之以欺後世者不惟占筮亡即周易亦亡夫彖辭卦辭猶筮辭也聖人設卦觀象以繋詞猶之剛柔相推八卦相盪以玩占也易以象為辭而今反舍象而斷辭易繋詞以明占而今反舍占而專求此卦詞之字句是詞象變占不當並設而究其所為字句者又仍無一解何為涉川何為即麓何為戰龍而乗馬即離日坎月乾金震竹牛羊甲兵井繘床胏凡易之觀象而繋詞者全然大貿而乃謂兩傳多事即周官三易亦難以考據將韓宣子來聘所稱易象春秋周禮在魯者三書一併亡矣予作仲氏易就五易以衍三易曰變易曰交易曰反易曰對易曰移易且作推易始末立十筮以括九筮曰名曰義曰象曰方位曰次第順逆曰大小體曰互體曰時日氣曰數目曰乗承敵應及書成而易義明即占易之法亦與之俱明覺向時讀諸傳而茫然者而今豁然向之繹其辭覈其事以為必不能有是而悶然者而今則實見其有是而鬯然快然此非三古以來數千年不傳之秘至今日而始發之乎當説易時亦稍存其説于卷中而觀者以為簡約多未備且雜附難考因專輯此書名曰春秋卜筮以倖存周官筮人之一綫焉春秋内傳莊二十二年傳陳厲公生敬仲其少也周史有以周易見陳侯者周史周太火掌書善易筮者陳敬仲即陳公子完也是年陳宣公殺太子御冦而敬仲慮禍及奔齊齊侯使為卿其後子孫田氏竟代齊有國因追遡前事而述少時周史占筮之辭以為後驗陳侯使筮之遇觀坤下巽上之否坤下乾上所遇是觀卦以四爻動當變故以六四變九四以巽變乾謂之之之者徃也後倣此此是兼卦凡筮有專卦兼卦總合卦中所有名位體象徃來順逆諸法而備推之無專卦占總彖兼卦占變爻所遇所之但占遇而不占之之説與宋人易學啓蒙占法大别惟隋劉炫謂兼卦亦祗占遇卦而不占之以哀九年晉侯筮救鄭陽貨祗占所遇歸妹一卦為証然亦非是説見後曰是謂觀國之光利用賓于王此觀卦六四爻辭此其代陳有國乎不在此其在異國乎非此其身在其子孫自此至其昌乎皆史之筮辭是謂二句是象辭先明述象詞隨下數斷語然後次第發明之大扺作筮詞法或散或韻總任揲筮者臨占撰造之語非舊有成文如是也焦贑見他傳有全用韻者疑為成文因造易林一書預為韻詞一如神祠之筊經以待人來占則可笑甚矣若郭璞亦自造龜卜繇辭名曰辭林則皆其自記巳卜之事與筮辭同夫巽坤何以名觀也巽坤者兼畫之艮即大艮也如臨為大震類説卦艮為門闕即闕門又名觀門傳所謂兩觀者也特朝有觀廟亦有觀舊以艮為鬼門指宗廟言而其解則祗以觀闕懸象備觀看之義故諸爻皆觀上觀下各有所觀而惟此一爻則正值大艮闕門與三五同功互艮闕門之内每卦以三至五二至四為互卦名為同功恰是觀象觀象者觀光也筮法卦有方位方者離南坎比之類位者六爻之位如一二三為陽隂陽為離位四五六為陰陽隂為坎位此定位也然位上加爻錯雜難辨惟純隂純陽則見之故坤為純陰内卦有離離為日為火見説卦為光見虞氏易坤象所云地道光文言所云含萬物而化光者雖離光即坤光也今觀下有坤坤為國見虞氏易又名國光其觀國光而至者書云覲光詩云休有烈光皆有國之人大扺不越諸侯來朝諸侯助祭及諸侯貢士于王三等而縂稱曰賓其在來朝稱大賓客在貢士稱賓興而在助祭則稱王賓稱助祭之賓皆賓也而陳備三恪適是賓國此非代陳有國乎完雖公子或當嗣君而無如其變為否也既變否則似不在陳而在他國且不在其身而在其子孫其故何也光逺而自他有耀者也坤土也巽風也乾天也風為天于土上山也有山之材而照之以天光於是乎居土上則以光者逺而不近光在此而耀在彼非可以國光限者夫坤之為土巽之為風乾之為天皆見説卦夫人而知之也特巽上坤下有風土而獨無天今以㢲之六四變乾之九四是觀外之風變而為否外之天天下濟而地上承當必有山居其間而二四互艮公然山也二四同功為互艮然且艮從巽變㢲為山木説卦有山之材而照之以乾之大赤説卦乾為大赤三陽輝輝尚猶是國光也乎夫國光坤光耳此為天光以天光而加國上光雖逺而國已殊也此自他者也異國也故曰觀國之光利用賓于王庭實旅百奉之以玊帛天地之美具焉故曰利用賓于王故賓王有説諸侯來賓必各具享禮陳百物以實于庭所謂庭實而旅百是也顧物豈易具毋論四享三享陳物不一乃即以玊帛觀之乾為金玊坤為布帛皆説卦向使觀未變否則有坤無乾有地無天有布帛而無金玉而今則天地之物既美且備此其賓王為何如者故曰利也猶有觀焉故曰其在後乎然而未逮也夫否之二四而成互艮也山也實觀也前既為觀則朝廟之外豈當更復有觀者乃猶有觀焉高踞艮剛苐俯觀門闕而身不得入觀象之内則後此者矣非其身矣風行而著于土故曰其在異國乎若在異國必姜姓也姜太嶽之後也山嶽則配天物莫能兩大陳衰此其昌乎如此則既不在陳又不在身象固如是然而其國安在夫風行而著于土任所至而託足焉其為異國固然也顧何異國也吾以觀否合占之觀以大艮合互艮而否則又以互艮而仍合大艮則以一大山而領諸衆山之小此大嶽也大嶽者姜姓此必姜氏之國也然而物有興衰卦既變否則必先有否而大至焉故大嶽配天天子祭天地則嶽瀆配之今否上有天山自能配然而自觀之否約有四山觀一大山否又一大山而究之合兩為一總成一否艮泰震之大山否為大艮猶泰為大震總見筮法能有兩乎則必陳衰而後此國昌其周史筮辭有如是者及陳之初亡也陳桓子始大于齊其後亡也成子得政原文皆有刪無改後倣此此附記後驗文也昭八年楚滅陳哀十七年楚復滅陳故有前後亡陳桓子即無宇成子田常也敬仲至田常約有七世又三世滅齊已十世矣十者陰數之盡繋辭地數十觀否皆内坤故與數合唐人定命錄天寳十四年王諸入解筮遇乾之觀謂巳及賓王而大人未見以乾五不動也遂遇祿山變而返此以貢士賓興解賓王頗合筮法但觀互為坤坤在九家易曰為亂在虞氏易曰為師而内坤離位則説卦直曰為甲胄為戈兵此與祿山之變一何駭切向遇周央則又疑鬼疑神矣始知聖人設筮無時不告而世卒無知之者因附識此閔元年傳初畢萬筮仕于晉遇屯下震上坎之比下坤上坎畢萬畢公髙之後仕晉為大夫晉侯初作二軍萬為車右以滅魏遂賜萬以魏其後分晉有國此筮仕晉之始也辛廖占之曰吉辛廖晉太火屯固比入吉孰大焉其必蕃昌何以吉也夫屯之為義也下震動而上坎險皆説卦文動而得險故曰屯比之為義下坤土而上坎水水土相比故曰比然而屯貴貞守卦所云居貞又云利貞者貞也即固也比貴親切彖所云比輔象所云比孚者皆親切者也切者入也所守既貞固而與物善入則于以筮仕有何勿吉而吾并卜其必後昌者震為土車從馬足居之兄長之母覆之衆歸之六體不易合而能固安而能殺公侯之卦也公侯之子孫必復其始則以卦分合有體自震一變坤而雷變為土因之震之為車坤之為馬亦相從焉此合體也為車為馬説見後乃分觀震體則震居乾之下體而又為長男説卦震為足虞氏諸易為兄既可作國之長伯而以觀坤體則以母覆衆坤為母為衆見説卦將育物而物歸之但觀此六體而子孫之昌有不易者况萬為畢公髙之後前既為侯則後必以侯復之屯曰利建侯則比之建萬國以親諸侯所之與所遇始終如一筮有卦雖變而仍不變者此其一也震為車説卦與諸家無考惟國語司空季子占公子重耳之筮云震車也則有據矣况後秦伯伐晉傳又稱震為侯車此無可疑者若坤為馬則正義以卦辭利牝馬之貞為証惟比合屯固坤安震殺則全無所出或謂子太叔對趙簡子有為刑威獄使民畏忌以類其震曜殺戮一語即是震殺則震曜殺戮四字連列非相承作解何足為據閔二年傳成季之將生也桓公使卜楚丘之父卜之此不載又筮之遇大有乾下離上之乾乾下乾上成季魯三家季氏之祖季友也以諡成曰成季曰同復于父敬如君所父所韻此卜父筮詞然從無解著舊註云乾為君父離本是乾子今還變為乾故曰復父然仍不可解按季友為魯桓第四子長莊公次仲慶父又次叔牙季其少也少子將生而筮男女則其所告者當不出六索之法見説卦乃遇大有而變上離則離為中女原有未合然獨不曰季與莊公為同母弟乎二人皆嫡母文姜所生而仲叔兩家縂屬長庶古嫡稱同母庶仄稱同父惟重嫡故并重母則以女君生次子而專屬之母此之坤母之再索則再索得離何為不可不過曰此女君之次生云耳乃一變為乾而巳復父矣乾為父此同父矣然且乾為純爻爻内有卦位説見前向為上離時則坎位不見今變乾而中坎昭然坎為次子則向為母索者今變為父索非復父乎又且嫡庶分父母并分氏族長嫡既為君則必次嫡為大宗諸庶為小宗而後各改氏而共成一族以一父也此宗法見大小宗通繹今桓之四子莊既嗣桓則季氏大宗仲叔小宗當合仲叔季三氏而共成桓族謂之三桓乃次嫡未生離未變乾則上卦三乾中闕其一安所得三桓而齊視之而一變而三乾並列縂成一乾三桓三族縂一桓族則其所為復父者獨季氏也乎故曰同也若然則乾為君父不惟同父亦且同君雖非君而如君之尊可以推位而得之位者所也祗君所不同初遇大有時上離下乾離日而乾天日居天上巳駸駸有凌所之勢及一變而大有六五竟改為乾之九五九五君位雖非大有六五交孚威如有合同謹畏之象亦誰敢不敬宜乎季孫之後專國政而卑公室儼然君也特是大有之變衆多分勢大有衆多之象而離位南方終守北面故春秋戰國他饒簒竊而魯獨無有即昭公出遜亦且虚位多年不越尺寸則其敬君所者豈真君所哉如之而已僖十五年傳秦伯伐晉卜徒父筮之吉涉河侯車敗詰之曰乃大吉也三敗必獲晉君秦伯秦穆晉侯晉惠也晉惠入國實秦穆所納而晉不報德而反報以怨故伐晉卜徒父掌卜筮官自吉以下六字皆徒父之言是時筮者見卦象有異怪之不先示何卦急曰涉河侯車敗矣秦伯不知卦并未聞筮辭恐車敗在已故詰之乃曰我大吉其敗在晉且不止車敗似當三敗其前軍而後敗侯車而獲其君其故何也其卦遇蠱上艮下巽以其卦遇蠱也前此數語則皆於此一語解之蠱内巽外艮内既㢲順而外復艮止動輒得敗故曰蠱蠱者敗也乃以象言之凡兩卦之間有一剛在中即謂之坎今以兩剛居初四之間則在蠱卦辭原曰涉川蠱元亨利涉大川而秦之入晉又必踰河以進之因而曰涉河此固然也顧既已涉河則兩軍相接當占車乗今蠱之三五恰有互震居其間則震車也見前且此非他車震為諸侯見九家諸易即侯車也然且震名仰盂見卦訣實有類于車箱然乃蠱上有艮艮為倒震見轉易法震一倒而車箱盡傾向之所為仰盂者今覆盌矣艮覆盌亦卦訣傾與覆為敗則敗矣故曰侯車敗張文楚曰先生解是傳成客有從江寧來者驟見大驚以為入神然究未敢信曰轉易何據先生曰轉易即倒易文王設此法為序卦用者凡六十四卦惟乾坤坎離頤大過中孚小過八卦不倒餘則屯蒙一倒需訟一倒師比一倒皆兩兩顛倒歴排之以至于盡是轉易一法實周易開卷一大面目而舉世不曉宜乎六經盡亡遭宋人蠱惑而終不察也客乃取易諦視之再拜而退特蠱以敗名不止一敗似涉河之時當先有三敗而後及于車敗者按推易一法類聚羣分必以陽之合聚者分移他卦以為卦謂之徃來泰之小徃大來否之大徃小來皆是也徃者去也今蠱之為卦實從泰與恒損三陽合聚者徃來而成然而無陽來而祇有陽去一從泰之三陽初徃上來一從恒之三陽四徃上來一從損所環聚之三陽初徃三來説見仲氏易卷首及各卦凡此三推皆以我所聚三陽徃而移彼謂之三去去與驅通字即三驅也然且三去必涉河泰踰兩剛泰初踰二三陽兩陽而出險即是踰河下同損踰一剛恒且踰上位隠坎之剛上為坎位隠見于外説見前是前稱三敗後稱三去皆于踰河時見之故曰必涉河而後侯車敗非無謂也張文檒曰推易即移易在伏羲時即有之如山澤為損亦從泰之三陽三徃上來及倒損為益上風下雷則又從否之三陽初徃四來此倒易亦移易也然而損下益上損下卦一陽而益之上則所損在我即名曰損損上益下損上卦一陽而益之下則所益在我故名曰益是伏羲畫卦亦早以推移徃來定卦名矣况小大徃來文王言之剛來下柔柔來文剛則孔子言之然且類聚羣分剛柔相推繋詞兩篇無非解推易一法此真三聖作易之至祕而五易全亡九筮滅没非先生其誰發之然而必知獲君者艮為止天下無車敗而車中之人不止獲者凡被獲曰止國語君之止子之罪也竟以獲稱止即此事也又且艮為手為拘拘者係也説卦拘誤作狗今從荀易改正故隨為倒蠱見轉易法而隨之互艮亦且拘係小子拘係丈夫而繼之曰隨有獲此非拘止之而獲之也乎是晉侯之獲歴觀之艮象而有斷然者故曰此可必也曰千乗三去三去之餘獲其雄狐夫狐蠱必其君也去叶驅此又作有韻筮辭以申括之千乗諸侯也三去見前雄狐者艮為狐狼見虞氏易艮之陽一爻即雄狐也蠱者君父之惡以陽狐而擅君父之惡是狐而蠱者故曰必其君蠱之貞風也其悔山也嵗云秋矣我落其實而取其材所以克也實落材亡不敗何待此又别解内外象以備餘意洪範内卦為貞外卦為悔内巽外艮則内風外山象固然也但據經文此時十一月而傳稱秋者周之十一月即夏之九月恰是秋時卜筮重時氣故必以夏時斷之若艮象無材而曰材曰實以卦有互震震為木而上連艮山謂之山木則山有材實矣此與陳敬仲傳有山之材義同三敗及韓此下記事文今即錄之以明驗韓晉地即韓原戰于韓原晉戎馬還濘而止戎者晉侯之車傳稱步揚御戎家僕父為右者馬即小駟駕車者也還盤旋也止者拘也駕車之馬盤旋泥濘中而拘止其車此車敗之驗秦獲晉侯以歸穆姬聞晉侯將至以太子罃𢎞與女簡璧登臺而履薪焉使以免服衰絰迎穆姬秦穆夫人晉惠姊也太子罃即秦康𢎞其母弟與女名簡璧皆姬所生履薪者自囚請罪之禮且使行人䘮服迎秦伯明必死也子桑曰歸之而質其太子必得大成子桑秦大夫公孫枝也謂當蹄晉君太子圉為質秦伯從其言乃許晉平春秋占筮書卷一
