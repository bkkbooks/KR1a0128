body:
  text: 春秋占筮書易類提要臣等謹案春秋占筮書三卷國朝毛竒齡撰其曰春秋者托春秋傳所載占筮以明古人之易學實為易作不為春秋作也自漢以來言占筮者不一家而取象玩占存於世而可驗者莫先於春秋傳竒齡既於所著仲氏易推易始末諸書發明其義因復舉春秋內外傳中凡有得於占筮者彚記成書俾後之言筮者知觀玩之概而漢晉以下占筮有合於古法者亦隨類附見焉易本卜筮之書聖人推究天下之理而即數以立象後人推究周易之象而即數以明理羲文周孔之本旨如是而已厥後象數理岐為三家又易道廣大無所不包而天下之事亦無出象數理外者於是百家技術皆從而牽引推闡之亦皆足以自成其説故六經之學惟易最雜春秋內外傳所紀雖未必無所附會而要其占法則固古人之遺軌譬之史書所載是非褒貶或未盡可憑至其一代之制度則固無偽撰者也竒齡因春秋諸占以推三代之筮法可謂能探其本而足關諸家之喙者矣乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e2fbbe5e052eb4528b0d431e562bc74a209f32ae9a6488c7bbef57f364cd5cff
